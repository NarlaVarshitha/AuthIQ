{% extends "base.html" %}
{% block title %}Login — AuthIQ{% endblock %}
{% block content %}
<div class="container iq-auth-wrap">
  <div class="iq-auth-card">
    <div class="iq-auth-logo"><span class="iq-logo-shield">⬡</span> Auth<span class="iq-accent">IQ</span></div>
    <h2 class="iq-auth-title">Welcome Back</h2>
    <p class="iq-auth-sub">Login to access your dashboard</p>
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="iq-input-label">Email</label>
        <input type="email" name="email" class="iq-url-input w-100" placeholder="you@example.com" required/>
      </div>
      <div class="mb-3">
        <label class="iq-input-label">Password</label>
        <input type="password" name="password" class="iq-url-input w-100" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn iq-btn-primary w-100 mt-2">Login →</button>
    </form>
    <p class="text-center mt-3 small">No account? <a href="/register" class="iq-link">Register here</a></p>
    <p class="text-center mt-1 small text-muted">Admin: admin@authiq.in / admin123</p>
  </div>
</div>
{% endblock %}
